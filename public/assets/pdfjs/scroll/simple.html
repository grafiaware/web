<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <title>PDF scroll viewer</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    #wrapper {
      height: 100vh;
      overflow-y: auto;
      background: #eee;
    }

    .page {
      display: flex;
      justify-content: center;
      padding: 16px 0;
    }

    canvas {
      background: #fff;
      max-width: 100%;
      height: auto;
      box-shadow: 0 2px 10px rgba(0,0,0,.15);
    }
  </style>
</head>
<body>

<div id="wrapper"></div>

<script type="module" src="simple.js"></script>
</body>
</html>
